<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arrow Key Video Player</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      color: white;
      overflow: hidden;
      font-family: system-ui, sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      background: black;
    }

    #playerWrapper {
      position: relative;
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
    }

    video {
      max-width: 100%;
      max-height: 100%;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: black;
    }
  </style>
</head>
<body>
  <div id="playerWrapper">
    <video id="videoPlayer" playsinline loop="false"></video>
  </div>

  <script>
    const videoPlayer = document.getElementById('videoPlayer');
    let isPlaying = false;

    const keyToVideo = {
      ArrowUp: 'up.mp4',
      ArrowDown: 'down.mp4',
      ArrowLeft: 'left.mp4',
      ArrowRight: 'right.mp4',
    };

    function playVideo(src) {
      if (isPlaying) {
        return;
      }

      videoPlayer.src = src;
      videoPlayer.load();
      videoPlayer.play().catch((error) => {
        console.error('Video playback failed:', error);
      });
      isPlaying = true;
    }

    window.addEventListener('keydown', (event) => {
      if (!keyToVideo[event.key]) {
        return;
      }

      event.preventDefault();

      if (isPlaying) {
        return;
      }

      const nextVideo = keyToVideo[event.key];
      playVideo(nextVideo);
    });

    videoPlayer.addEventListener('ended', () => {
      isPlaying = false;
    });

    videoPlayer.addEventListener('pause', () => {
      if (!videoPlayer.ended) {
        isPlaying = false;
      }
    });

    videoPlayer.addEventListener('error', () => {
      isPlaying = false;
      console.error('Video failed to load. Confirm the file exists and the filename is correct.');
    });
  </script>
</body>
</html>
